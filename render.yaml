# =============================================
# Important Render Notes for WebSocket Support:
# =============================================
# 
# 1. FREE TIER LIMITATIONS:
#    - WebSocket connections are killed after 15 minutes of inactivity
#    - Consider Starter plan ($7/mo) for persistent WebSocket connections
#    - Free tier is OK for testing but not production
#
# 2. WEB SOCKET REQUIREMENTS:
#    - Render automatically handles WebSocket upgrade requests
#    - No special configuration needed in render.yaml
#    - Ensure your app responds to HTTP health checks
#    - Upgrade request headers must be forwarded correctly
#
# 3. DOMAIN CONFIGURATION:
#    - Both frontend and backend get *.onrender.com subdomains
#    - For WebSocket connections, use relative path (same origin)
#    - Or configure CORS_ORIGINS with your frontend domain
#
# 4. DATABASE:
#    - Create MongoDB database separately in Render
#    - It will auto-inject MONGO_URL into the backend service
#    - Backups available on paid plans
#
# 5. SCALING:
#    - WebSocket connections are pinned to specific instances
#    - Use Redis for session management if scaling horizontally
#    - Add Redis add-on from Render marketplace if needed
#
# 6. MONITORING:
#    - Check logs: https://dashboard.render.com/[service]/logs
#    - Monitor metrics: https://dashboard.render.com/[service]/metrics
#    - Set up alerts for failed health checks
#
# 7. CUSTOM DOMAIN:
#    - Add custom domain in Render dashboard
#    - Update CORS_ORIGINS environment variable
#    - Update REACT_APP_BACKEND_URL if using separate domains
#
# 8. TESTING BEFORE DEPLOY:
#    - Run: docker compose up --build
#    - Test WebSocket: Connect via browser to localhost:3000
#    - Verify health: curl http://localhost:10000/api/health
#
# Quick Deploy Commands:
#
# 1. Sign up at https://render.com
# 2. Create new Web Service
# 3. Connect GitHub repository
# 4. Set build command: pip install -r backend/requirements.txt
# 5. Set start command: uvicorn server:app --host 0.0.0.0 --port $PORT
# 6. Set environment variables (JWT_SECRET, etc.)
# 7. Deploy!
