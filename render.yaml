#########################################
# Vyra - Render.com Deployment Configuration
#########################################
# Save as: render.yaml
# 
# Deploy to Render: https://render.com
# Docs: https://render.com/docs/yaml-spec
# =============================================

services:
  # =============================================
  # Backend Web Service (FastAPI)
  # =============================================
  - type: web
    name: vyra-backend
    env: python
    plan: free
    # plan: starter  # Upgrade for WebSocket reliability
    
    # Build configuration
    buildCommand: >-
      pip install --no-cache-dir -r backend/requirements.txt
    
    # Start command - uvicorn production server
    startCommand: >-
      uvicorn server:app \
        --host 0.0.0.0 \
        --port $PORT \
        --workers 1 \
        --log-level warning
    
    # Runtime environment variables
    envVars:
      - key: MONGO_URL
        # For Render MongoDB, use the auto-injected env vars
        fromDatabase:
          name: vyra-database
          property: connectionString
      - key: DB_NAME
        value: vyra
      - key: JWT_SECRET
        # Set this in Render dashboard: Settings -> Environment
        sync: false
      - key: CORS_ORIGINS
        # Fixed to match actual frontend domain on Render
        value: "*"
      - key: PORT
        fromRegion: true
      - key: LOG_LEVEL
        value: INFO
      - key: ENABLE_HEALTH_CHECK
        value: "true"
    
    # Auto-deploy on push to main branch
    autoDeploy: true
    
    # Health check path (Render requirement)
    healthCheckPath: /api/health
    
    # Timeout settings (important for WebSocket connections)
    timeout: 600
    
    # Minimum instance size for WebSocket support
    # Free tier may drop WebSocket connections after 15 min idle
    # Consider upgrading to Starter ($7/mo) for persistent WebSockets
    minInstances: 1
    maxInstances: 10
    
    # Auto-rollback on failed deploy
    autoRollback: true

  # =============================================
  # MongoDB Database (Managed)
  # =============================================
  # Create via Render Dashboard:
  # 1. Go to https://dashboard.render.com/New -> Database
  # 2. Select MongoDB
  # 3. Name: vyra-database
  # 4. Plan: $0 (Sandbox) or higher for production
  #
  # The database will inject these env vars:
  # - MONGO_DATABASE_TEST_CONNECTION_STRING
  # - MONGO_CONNECTION_STRING
  # - MONGO_HOST
  # - MONGO_PORT
  # - MONGO_USER
  # - MONGO_URL
  # - MONGO_DATABASE_NAME

  # =============================================
  # Frontend Static Site (React)
  # =============================================
  - type: web
    name: vyra-frontend
    env: static
    plan: free
    
    # Build configuration
    buildCommand: >-
      cd frontend &&
      yarn install --frozen-lockfile &&
      yarn build
    
    # Publish directory (Vite build output)
    publishDir: frontend/build
    
    # Environment variables for frontend
    envVars:
      - key: REACT_APP_BACKEND_URL
        # Use relative path to share domain with backend
        # Both services will be under render.com subdomain
        # Or use custom domain with proxy rules
        value: ""
      - key: NODE_ENV
        value: production
    
    # Auto-deploy on push to main branch
    autoDeploy: true
    
    # Health check
    healthCheckPath: /
    
    # Auto-rollback on failed deploy
    autoRollback: true

